name: Gett
description: >
  Gett is a corporate ground transportation platform offering a REST API for
  booking on-demand and pre-scheduled rides, managing business travel accounts,
  handling employee records, accessing order receipts, and integrating with
  expense management systems. The API supports multi-passenger, multi-stop,
  and multi-dropoff scenarios and connects businesses with a global supplier
  network of taxis, black cars, and private-hire vehicles.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Ground Transportation
  - Corporate Travel
  - Ride Booking
  - Business Travel
  - Expense Management
